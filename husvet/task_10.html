<!DOCTYPE html>
<html>
<head>
    <title>Feladat 10</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Feladat 10</h1>
        <p>Tálcán sáskám táncát látván kátrányt hány lánybárány hányt rám?</p>
        
        <input type="text" id="answer" placeholder="Ide írjátok a választ.">
        <br>
        <button onclick="checkAnswer()">Nyomd meg</button>

        <p id="feedback"></p>
    </div>

    <script>
        function checkAnswer() {
            let input = document.getElementById("answer").value.trim();

            // Normalize input
            let normalized = input.toLowerCase();

            // Acceptable answers
            let correctAnswers = ["2", "kettő"];

            if (correctAnswers.includes(normalized)) {
                document.getElementById("feedback").innerText = "Szép munka! 🎉";

                // Go to next task after short delay
                setTimeout(() => {
                    window.location.href = "task_11.html";
                }, 1000);

            } else {
                document.getElementById("feedback").innerText = "Szép munka! 🎉";

                // Go to next task after short delay
                setTimeout(() => {
                    window.location.href = "task_11.html";
                }, 1000);
            }
        }
    </script>
</body>
</html>
