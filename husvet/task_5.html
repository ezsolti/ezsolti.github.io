<!DOCTYPE html>
<html>
<head>
    <title>Feladat 5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Feladat 5</h1>
        <p>Nyuszi HOPP: ajtótól a hálóig, együtt ugrik két nyuszi, Sári és Satyi.</p>
        <p>Mennyit ugranak ketten együtt?</p>

        <img src="task_5.png" alt="Egg image">

        <input type="text" id="answer" placeholder="Ide írjátok a választ.">
        <br>
        <button onclick="checkAnswer()">Nyomd meg</button>

        <p id="feedback"></p>
    </div>

    <script>
        function checkAnswer() {
            let input = document.getElementById("answer").value.trim();

            // Normalize input
            let normalized = input.toLowerCase();

            // Acceptable answers
            let correctAnswers = ["16", "tizenhat"];

            if (correctAnswers.includes(normalized)) {
                document.getElementById("feedback").innerText = "Szép munka! 🎉";

                // Go to next task after short delay
                setTimeout(() => {
                    window.location.href = "task_6.html";
                }, 1000);

            } else {
                document.getElementById("feedback").innerText = "Szép munka! 🎉";

                // Go to next task after short delay
                setTimeout(() => {
                    window.location.href = "task_6.html";
                }, 1000);
            }
        }
    </script>
</body>
</html>
