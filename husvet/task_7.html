<!DOCTYPE html>
<html>
<head>
    <title>Feladat 7</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Feladat 7</h1>
        <p>Hány tyúk rejtőzködik a megjelölt helyen?</p>
        

        <img src="task_7.png" alt="Egg image">

        <input type="text" id="answer" placeholder="Ide írjátok a választ.">
        <br>
        <button onclick="checkAnswer()">Nyomd meg</button>

        <p id="feedback"></p>
    </div>

    <script>
        function checkAnswer() {
            let input = document.getElementById("answer").value.trim();

            // Normalize input
            let normalized = input.toLowerCase();

            // Acceptable answers
            let correctAnswers = ["3", "három", "harom"];

            if (correctAnswers.includes(normalized)) {
                document.getElementById("feedback").innerText = "Szép munka! 🎉";

                // Go to next task after short delay
                setTimeout(() => {
                    window.location.href = "task_8.html";
                }, 1000);

            } else {
                document.getElementById("feedback").innerText = "Próbáljátok újra! 🐰";
            }
        }
    </script>
</body>
</html>
