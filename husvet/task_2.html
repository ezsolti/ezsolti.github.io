<!DOCTYPE html>
<html>
<head>
    <title>Feladat 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Feladat 2</h1>
        <p>Egy tök,</p>
        <p>Két tök,</p>
        <p>Öt tök,</p>
        <p>Nem tökölök - öntök.</p>
        <p>Hány "ö" betű van a locsolóversben?</p>


        <input type="text" id="answer" placeholder="Ide írjátok a választ.">
        <br>
        <button onclick="checkAnswer()">Nyomd meg</button>

        <p id="feedback"></p>
    </div>

    <script>
        function checkAnswer() {
            let input = document.getElementById("answer").value.trim();

            // Normalize input
            let normalized = input.toLowerCase();

            // Acceptable answers
            let correctAnswers = ["9", "kilenc"];

            if (correctAnswers.includes(normalized)) {
                document.getElementById("feedback").innerText = "Szép munka! 🎉";

                // Go to next task after short delay
                setTimeout(() => {
                    window.location.href = "task_3.html";
                }, 1000);

            } else {
                document.getElementById("feedback").innerText = "Próbáljátok újra! 🐰";
            }
        }
    </script>
</body>
</html>
