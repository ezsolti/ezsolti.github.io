<!DOCTYPE html>
<html>
<head>
    <title>Feladat 8</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Feladat 8</h1>
        <p>Az Újszövetség szerint Jézus – pénteki keresztre feszítése után – a harmadik napon feltámadt.</p>
        <p>Milyen nap a harmadik nap péntek után?</p>

        <img src="task_8.jpg" alt="Egg image">

        <input type="text" id="answer" placeholder="Ide írjátok a választ.">
        <br>
        <button onclick="checkAnswer()">Nyomd meg</button>

        <p id="feedback"></p>
    </div>

    <script>
        function checkAnswer() {
            let input = document.getElementById("answer").value.trim();

            // Normalize input
            let normalized = input.toLowerCase();

            // Acceptable answers
            let correctAnswers = ["hetfo", "hétfő", "HETFO"];

            if (correctAnswers.includes(normalized)) {
                document.getElementById("feedback").innerText = "Szép munka! 🎉";

                // Go to next task after short delay
                setTimeout(() => {
                    window.location.href = "task_9.html";
                }, 1000);

            } else {
                document.getElementById("feedback").innerText = "Próbáljátok újra! 🐰";
            }
        }
    </script>
</body>
</html>
