<!DOCTYPE html>
<html>
<head>
    <title>Feladat 3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Feladat 3</h1>
        <p>Csináljunk nyuszit!</p>
        <p>A teraszon táltok hozzávalót!</p>

        <img src="task_3.jpeg" alt="Egg image">
        <p>Kész van?</p>
        <input type="text" id="answer" placeholder="Ide írjátok a választ.">
        <br>
        <button onclick="checkAnswer()">Nyomd meg</button>

        <p id="feedback"></p>
    </div>

    <script>
        function checkAnswer() {
            let input = document.getElementById("answer").value.trim();

            // Normalize input
            let normalized = input.toLowerCase();

            // Acceptable answers
            let correctAnswers = ["igen", "IGEN"];

            if (correctAnswers.includes(normalized)) {
                document.getElementById("feedback").innerText = "Szép munka! 🎉";

                // Go to next task after short delay
                setTimeout(() => {
                    window.location.href = "task_4.html";
                }, 1000);

            } else {
                document.getElementById("feedback").innerText = "Próbáljátok újra! 🐰";
            }
        }
    </script>
</body>
</html>
